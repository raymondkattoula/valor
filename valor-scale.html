<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Valor — Select Portfolio Opportunities</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #fff;
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 24px 100px;
      overflow-x: hidden;
    }

    .header { text-align: center; margin-bottom: 28px; }
    .header-eyebrow {
      font-size: 14px; font-weight: 600; letter-spacing: .14em;
      text-transform: uppercase; color: #0043ec; margin-bottom: 12px;
    }
    .header-title { font-size: 30px; font-weight: 700; color: #111827; letter-spacing: -.035em; }

    .carousel-wrap { width: 100%; max-width: 1100px; display: flex; flex-direction: column; align-items: center; }

    .track-outer {
      position: relative; width: 100%; height: 220px;
      display: flex; align-items: center; justify-content: center;
      -webkit-mask: linear-gradient(to right, transparent 0%, black 18%, black 82%, transparent 100%);
      mask: linear-gradient(to right, transparent 0%, black 18%, black 82%, transparent 100%);
    }

    .card {
      position: absolute; width: 130px;
      background: transparent; border: none;
      padding: 10px 8px; display: flex; flex-direction: column;
      align-items: center; gap: 0; cursor: pointer;
      transition: transform .42s cubic-bezier(.25,.46,.45,.94), opacity .42s ease;
      user-select: none; will-change: transform, opacity;
      -webkit-tap-highlight-color: transparent;
    }
    .card.is-center { cursor: default; }

    .card-logo {
      width: 116px; height: 116px; border-radius: 18px;
      overflow: hidden; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: #f9fafb;
    }
    .card-logo img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .card-name { font-size: 12px; font-weight: 600; color: #111827; text-align: center; letter-spacing: -.01em; line-height: 1.3; }

    .nav-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 38px; height: 38px; border-radius: 50%;
      background: #fff; border: 1px solid #e5e7eb;
      cursor: pointer; font-size: 15px; color: #6b7280;
      display: flex; align-items: center; justify-content: center;
      z-index: 30; box-shadow: 0 1px 4px rgba(0,0,0,.07);
      transition: background .12s, border-color .12s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-btn:hover  { background: #f9fafb; border-color: #d1d5db; }
    .nav-btn:active { background: #f3f4f6; }
    .nav-btn:disabled { opacity: .25; cursor: default; }
    .nav-btn.left  { left:  10px; }
    .nav-btn.right { right: 10px; }

    .detail { margin-top: 44px; width: 100%; max-width: 560px; transition: opacity .25s ease, transform .25s ease; }
    .detail.hidden { opacity: 0; transform: translateY(8px); pointer-events: none; }

    .detail-name { font-size: 22px; font-weight: 700; color: #111827; letter-spacing: -.03em; margin-bottom: 10px; }
    .detail-meta { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-bottom: 20px; }
    .pill { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 9999px; white-space: nowrap; }
    .pill-stage { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 5px; white-space: nowrap; }
    .pill-muted { font-size: 12px; color: #9ca3af; font-weight: 400; }
    .detail-divider { width: 28px; height: 2px; background: #e5e7eb; border-radius: 2px; margin: 0 0 18px; }
    .detail-desc { font-size: 14px; color: #374151; line-height: 1.72; margin-bottom: 24px; }

    .scale-box { background: #eef3fe; border: 1px solid #c5d9fb; border-radius: 10px; padding: 16px 18px; }
    .scale-box-top { margin-bottom: 9px; }
    .fn-pill { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 4px; letter-spacing: .03em; }
    .scale-how { font-size: 13px; color: #374151; line-height: 1.62; }

    @media (max-width: 600px) {
      body { padding: 40px 16px 80px; }
      .header { margin-bottom: 20px; }
      .header-eyebrow { font-size: 10px; }
      .header-title { font-size: 22px; }
      .track-outer {
        height: 185px;
        -webkit-mask: linear-gradient(to right, transparent 0%, black 14%, black 86%, transparent 100%);
        mask: linear-gradient(to right, transparent 0%, black 14%, black 86%, transparent 100%);
      }
      .card { width: 110px; padding: 6px; gap: 0; }
      .card-logo { width: 96px; height: 96px; border-radius: 16px; }
      .card-name { font-size: 11px; }
      .nav-btn { width: 34px; height: 34px; font-size: 13px; }
      .nav-btn.left  { left: 4px; }
      .nav-btn.right { right: 4px; }
      .dots { margin-top: 16px; max-width: 100%; }
      .detail { margin-top: 32px; max-width: 100%; }
      .detail-name { font-size: 20px; }
      .detail-desc { font-size: 13.5px; }
      .scale-how { font-size: 12.5px; }
    }
    @media (max-width: 380px) {
      .header-title { font-size: 19px; }
      .card { width: 96px; }
      .card-logo { width: 84px; height: 84px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">Valor Equity Partners</div>
  <div class="header-title">Scale Opportunities</div>
</div>

<div class="carousel-wrap">
  <div class="track-outer" id="track">
    <button class="nav-btn left"  id="btn-l" onclick="go(-1)">&#8592;</button>
    <button class="nav-btn right" id="btn-r" onclick="go(1)">&#8594;</button>
  </div>
  <div class="dots" id="dots"></div>
  <div class="detail hidden" id="detail"></div>
</div>

const N = COS.length;
let cur = 0, transitioning = false;

function rEmp(n) { return Math.round(n / 10) * 10; }
function rFund(f) { if (!f) return null; if (f <= 25) return f; return Math.round(f / 10) * 10; }
function fmtF(f) { const r = rFund(f); if (!r) return null; return r >= 1000 ? `$${(r/1000).toFixed(1)}B` : `$${r}M`; }

const DPOS = [
  { x:0,   s:1,    o:1,    z:10 },
  { x:216, s:0.72, o:0.62, z:6  },
  { x:386, s:0.52, o:0.36, z:3  },
  { x:500, s:0.4,  o:0,    z:1  },
];
const MPOS = [
  { x:0,   s:1,    o:1,    z:10 },
  { x:148, s:0.72, o:0.62, z:6  },
  { x:265, s:0.52, o:0.36, z:3  },
  { x:350, s:0.4,  o:0,    z:1  },
];
const SPOS = [
  { x:0,   s:1,    o:1,    z:10 },
  { x:130, s:0.72, o:0.62, z:6  },
  { x:234, s:0.52, o:0.36, z:3  },
  { x:310, s:0.4,  o:0,    z:1  },
];
function getPOS() { const w = window.innerWidth; if (w <= 380) return SPOS; if (w <= 600) return MPOS; return DPOS; }

function buildCards() {
  const track = document.getElementById("track");
  COS.forEach((co, i) => {
    const card = document.createElement("div");
    card.className = "card"; card.id = `c${i}`;
    const logo = document.createElement("div");
    logo.className = "card-logo";
    if (LOGOS[co.name]) {
      const img = document.createElement("img");
      img.src = LOGOS[co.name]; img.alt = co.name;
      logo.appendChild(img);
    } else {
      logo.innerHTML = `<svg viewBox="0 0 80 80"><rect width="80" height="80" rx="16" fill="#6366f1"/><text x="40" y="54" text-anchor="middle" font-family="sans-serif" font-size="34" font-weight="700" fill="#fff">${co.name[0]}</text></svg>`;
    }
    card.appendChild(logo);
    card.onclick = () => { if (i !== cur && !transitioning) go(i - cur); };
    track.insertBefore(card, document.getElementById("btn-r"));
  });
}

function layout() {
  const POS = getPOS();
  COS.forEach((_, i) => {
    const el = document.getElementById(`c${i}`);
    const off = i - cur, abs = Math.abs(off), dir = off < 0 ? -1 : 1;
    const p = POS[Math.min(abs, 3)];
    el.style.transform = `translateX(${p.x * dir}px) scale(${p.s})`;
    el.style.opacity = p.o; el.style.zIndex = p.z;
    el.style.pointerEvents = abs > 2 ? "none" : "auto";
    el.classList.toggle("is-center", off === 0);
  });
  document.getElementById("btn-l").disabled = cur === 0;
  document.getElementById("btn-r").disabled = cur === N - 1;
  document.querySelectorAll(".dot").forEach((d, i) => d.classList.toggle("active", i === cur));
}

function showDetail(animate) {
  const panel = document.getElementById("detail");
  const co = COS[cur];
  const sc = SC[co.sector] || {bg:"#f3f4f6",txt:"#374151"};
  const fn = FN[co.scaleFn]|| {bg:"#f3f4f6",txt:"#374151"};
  const fund = fmtF(co.funding), emp = rEmp(co.employees);
  const render = () => {
    panel.innerHTML = `
      <div class="detail-name">${co.name}</div>
      <div class="detail-meta">
        <span class="pill" style="background:${sc.bg};color:${sc.txt}">${co.sector}</span>
        ${fund ? `<span class="pill-muted">${fund} raised</span>` : ""}
        <span class="pill-muted">~${emp} people</span>
      </div>
      <div class="detail-divider"></div>
      <div class="detail-desc">${co.desc}</div>
      <div class="scale-box">
        <div class="scale-box-top"><span class="fn-pill" style="background:${fn.bg};color:${fn.txt}">${co.scaleFn}</span></div>
        <div class="scale-how">${co.scaleHow}</div>
      </div>`;
    panel.classList.remove("hidden");
  };
  if (animate) { panel.classList.add("hidden"); setTimeout(render, 200); } else render();
}

function go(delta) {
  const next = Math.max(0, Math.min(N - 1, cur + delta));
  if (next === cur) return;
  transitioning = true; cur = next; layout(); showDetail(true);
  setTimeout(() => transitioning = false, 450);
}

function buildDots() {
  const container = document.getElementById("dots");
  COS.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "dot" + (i === 0 ? " active" : "");
    d.onclick = () => { if (!transitioning) go(i - cur); };
    container.appendChild(d);
  });
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") go(-1);
  if (e.key === "ArrowRight") go(1);
});

let touchStartX = 0, touchStartY = 0;
function addSwipe(el) {
  el.addEventListener("touchstart", e => { touchStartX = e.changedTouches[0].clientX; touchStartY = e.changedTouches[0].clientY; }, { passive: true });
  el.addEventListener("touchend", e => {
    const dx = touchStartX - e.changedTouches[0].clientX;
    const dy = Math.abs(touchStartY - e.changedTouches[0].clientY);
    if (Math.abs(dx) > 40 && dy < 60 && !transitioning) go(dx > 0 ? 1 : -1);
  }, { passive: true });
}
addSwipe(document.getElementById("track"));
addSwipe(document.getElementById("detail"));
window.addEventListener("resize", layout);

buildCards();
buildDots();
layout();
showDetail(false);
</script>
